# ============================================================
# BJJ Instructional Processor — Docker Compose
# ============================================================
# Levanta todo: docker compose up -d
#
# Servicios:
#   - processor-api:       FastAPI gateway         → :8000
#   - processor-frontend:  React 18 UI             → :3000
#   - chapter-splitter:    OCR + split (GPU)       → :8001
#   - subtitle-generator:  WhisperX (GPU)          → :8002
#   - dubbing-generator:   ElevenLabs cloud TTS    → :8003
#   - ollama:              LLM local (qwen2.5-7b)  → :11434
#
# Variables:
#   LIBRARY_PATH  → ruta host con los instruccionales (default /mnt/library)
# ============================================================

services:

  # Imagen base CUDA compartida. No levanta como servicio — solo se usa como
  # build target. docker compose build bjj-base → luego los servicios GPU la usan.
  bjj-base:
    build:
      context: .
      dockerfile: ./bjj-base/Dockerfile
    image: bjj-base:latest
    pull_policy: never
    profiles: ["base"]

  processor-api:
    build:
      context: .
      dockerfile: ./processor-api/Dockerfile
    container_name: processor-api
    ports:
      - "8000:8000"
    volumes:
      - config-data:/data/config
      - bjj-db:/data/db
      - voice-profiles:/app/voice_profiles/samples
      - search-index:/app/search
      - nas-library:/media:rw
    environment:
      - PYTHONUNBUFFERED=1
      - CONFIG_DIR=/data/config
      - BJJ_DB_PATH=/data/db/bjj.db
      - MEDIA_ROOT=/media
      - SPLITTER_URL=http://chapter-splitter:8001
      - SIGNAL_SPLITTER_URL=http://chapter-splitter-signal:8001
      - SUBS_URL=http://subtitle-generator:8002
      - DUBBING_URL=http://dubbing-generator:8003
      - TELEGRAM_FETCHER_URL=http://telegram-fetcher:8004
      # Ollama LLM endpoint. Defaults to the in-stack `ollama` service for
      # backwards compatibility; override to point at an external host
      # (e.g. http://10.10.100.13:11434) when running ollama in a separate
      # LXC. Both env vars must be set: pipeline.py reads OLLAMA_BASE_URL,
      # health_proxy.py reads OLLAMA_URL.
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      # ElevenLabs Dubbing Studio E2E (api/elevenlabs_dubbing.py). Empty
      # unless the user enables the frontend "Procesar con ElevenLabs" flow.
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
    depends_on:
      chapter-splitter:
        condition: service_healthy
      subtitle-generator:
        condition: service_healthy
      dubbing-generator:
        condition: service_healthy
    networks:
      - bjj_net
    # Necesario para montar shares SMB/CIFS del NAS
    privileged: true
    restart: unless-stopped

  processor-frontend:
    build:
      context: ./processor-frontend
      dockerfile: Dockerfile
    container_name: processor-frontend
    ports:
      - "3000:80"
    depends_on:
      - processor-api
    networks:
      - bjj_net
    restart: unless-stopped

  # Default chapter-splitter: lean image (~200MB). Oracle workflow only.
  # No GPU, no torch, no easyocr. Suficiente para 100% de la biblioteca BJJFanatics.
  chapter-splitter:
    build:
      context: .
      dockerfile: ./chapter-splitter/Dockerfile.oracle
    container_name: chapter-splitter
    ports:
      - "8001:8001"
    volumes:
      - nas-library:/media:rw
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - bjj_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # Heavy fallback: detector por señales (OCR + Demucs + GPU). ~13GB.
  # Solo se levanta con: docker compose --profile signal up -d
  chapter-splitter-signal:
    profiles: ["signal"]
    build:
      context: .
      dockerfile: ./chapter-splitter/Dockerfile
    container_name: chapter-splitter-signal
    ports:
      - "8011:8001"
    volumes:
      - nas-library:/media:rw
      - hf-cache:/models/huggingface
      - torch-cache:/models/torch
      - model-cache:/models/cache
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
    networks:
      - bjj_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  subtitle-generator:
    build:
      context: .
      dockerfile: ./subtitle-generator/Dockerfile
    container_name: subtitle-generator
    ports:
      - "8002:8002"
    volumes:
      - nas-library:/media:rw
      - hf-cache:/models/huggingface
      - torch-cache:/models/torch
      - model-cache:/models/cache
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
      # Ollama LLM endpoint for translator.py. Defaults to the in-stack
      # `ollama` service; override with OLLAMA_BASE_URL=http://10.10.100.13:11434
      # when running ollama in a separate LXC.
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
    networks:
      - bjj_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  dubbing-generator:
    build:
      context: .
      dockerfile: ./dubbing-generator/Dockerfile
    container_name: dubbing-generator
    ports:
      - "8003:8003"
    volumes:
      - nas-library:/media:rw
      - hf-cache:/models/huggingface
      - torch-cache:/models/torch
      - model-cache:/models/cache
      # Native ES voice samples. Drop a WAV (16-24kHz mono, 20-40 s of clean
      # Spanish speech) and set DUBBING_MODEL_VOICE_PATH to avoid the
      # instructor's English accent bleeding into the ES output.
      - ./dubbing-generator/voices:/voices:ro
      # S2-Pro GGUF + tokenizer. Place s2-pro-q6_k.gguf and tokenizer.json in
      # ${S2PRO_MODEL_DIR}. Read-only mount; the model file is large (4.5 GB)
      # so we never bake it into the image.
      - ${S2PRO_MODEL_DIR:-./models/s2pro-gguf}:/models/s2pro:ro
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
      # CUDA-only: s2.cpp uses the ggml-cuda backend. Docker Desktop on
      # WSL2 does NOT inject the NVIDIA Vulkan ICD into containers (only
      # CUDA passes through), so a Vulkan build crashes with
      # `vk::IncompatibleDriverError`. CUDA is honored everywhere we
      # care about (workstation WSL2 + Proxmox LXC server).
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - TORCH_HOME=/models/torch
      - HF_HOME=/models/huggingface
      - XDG_CACHE_HOME=/models/cache
      # Empty by default → la voz se selecciona desde la UI (metadatos del
      # instruccional). Override global opcional si quieres forzar una voz
      # fija para toda la biblioteca: DUBBING_MODEL_VOICE_PATH=/voices/X.wav.
      - DUBBING_MODEL_VOICE_PATH=${DUBBING_MODEL_VOICE_PATH:-}
      # ElevenLabs cloud TTS backend. API key obligatoria.
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      # Optional global default engine. Settings web override wins.
      - DUBBING_TTS_ENGINE=${DUBBING_TTS_ENGINE:-}
      # S2-Pro GGUF/tokenizer paths inside the container (paired with the
      # ${S2PRO_MODEL_DIR} bind-mount above).
      - S2PRO_GGUF_PATH=/models/s2pro/s2-pro-q6_k.gguf
      - S2PRO_TOKENIZER_PATH=/models/s2pro/tokenizer.json
    networks:
      - bjj_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute, utility]
    restart: unless-stopped

  # Telegram channel media fetcher (lean, ~250MB). No GPU.
  # Los retries con backoff en el cliente manejan el orden de arranque — no depende de processor-api.
  telegram-fetcher:
    build:
      context: .
      dockerfile: ./telegram-fetcher/Dockerfile
    container_name: telegram-fetcher
    ports:
      - "8004:8004"
    volumes:
      - tg-session:/data/session
      - tg-cache:/data/cache
      - bjj-db:/data/db
      - nas-library:/media:rw
    environment:
      - PYTHONUNBUFFERED=1
      - PROCESSOR_API_URL=http://processor-api:8000
      - BJJ_DB_PATH=/data/db/bjj.db
    networks:
      - bjj_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8004/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # In-stack Ollama (opt-in). Only starts with: docker compose --profile ollama up -d
  # When running Ollama in a separate LXC/host, leave this off and set
  # OLLAMA_BASE_URL in .env (e.g. http://10.10.100.13:11434).
  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    container_name: bjj-ollama
    restart: unless-stopped
    networks:
      - bjj_net
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
      - ./ollama/entrypoint.sh:/entrypoint.sh:ro
    environment:
      - OLLAMA_KEEP_ALIVE=2m
      - OLLAMA_HOST=0.0.0.0:11434
    entrypoint: ["/bin/bash", "-c", "tr -d '\\r' < /entrypoint.sh | bash"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:11434/api/tags | grep -q qwen2.5:7b-instruct-q4_K_M"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 1200s

volumes:
  config-data:
  bjj-db:
  voice-profiles:
  search-index:
  hf-cache:
  torch-cache:
  model-cache:
  tg-session:
  tg-cache:
  ollama-models:
  nas-library:
    driver: local
    driver_opts:
      type: cifs
      device: //${NAS_HOST}/${NAS_SHARE}
      o: "username=${NAS_USER},password=${NAS_PASS},uid=0,gid=0,vers=3.0,cache=strict,iocharset=utf8"

networks:
  bjj_net:
    driver: bridge
